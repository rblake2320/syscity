<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SysCosmos — Live System Solar System</title>
<style>
  :root{
    --hud-bg:rgba(4,2,18,.84);--hud-fg:#d8e4f8;--hud-dim:#6a7a9a;
    --hud-line:rgba(120,160,255,.12);--acc-dl:#4de8ff;--acc-ul:#ff5fa8;
    --acc-cpu:#ffb547;--acc-ok:#5eea8d;--mono:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#020008}
  body{font-family:var(--mono);font-size:12px}
  #scene{position:fixed;inset:0;display:block;cursor:grab}
  #scene.dragging{cursor:grabbing}
  .panel{position:fixed;backdrop-filter:blur(12px);background:var(--hud-bg);
    border:1px solid var(--hud-line);border-radius:10px;color:var(--hud-fg)}
  .eyebrow{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--hud-dim)}
  #hud{top:14px;left:14px;width:260px;padding:12px 14px}
  #hud h1{font-size:13px;font-weight:600;margin:2px 0 10px;display:flex;align-items:center;gap:8px}
  #srcDot{width:7px;height:7px;border-radius:50%;background:var(--acc-cpu);flex:0 0 auto}
  #srcDot.live{background:var(--acc-ok)}
  .stat{display:flex;justify-content:space-between;align-items:baseline;margin:6px 0 2px}
  .stat b{font-weight:600;font-variant-numeric:tabular-nums}
  .bar{height:3px;border-radius:2px;background:var(--hud-line);overflow:hidden;margin-bottom:7px}
  .bar i{display:block;height:100%;width:0;border-radius:2px;transition:width .6s}
  #cpuBar i{background:linear-gradient(90deg,var(--acc-ok),var(--acc-cpu))}
  #memBar i{background:linear-gradient(90deg,var(--acc-dl),#8a7dff)}
  #dskBar i{background:linear-gradient(90deg,#8a7dff,var(--acc-ul))}
  #netRow{display:flex;gap:14px;margin:8px 0 6px}
  #netRow .in{color:var(--acc-dl)} #netRow .out{color:var(--acc-ul)}
  #netOffline{display:none;color:var(--acc-ul);font-size:10px;letter-spacing:.1em;margin-top:2px}
  #netOffline.show{display:block}
  #legend{bottom:14px;left:14px;padding:10px 14px;font-size:10px;line-height:2}
  #legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  #controls{top:14px;right:14px;display:flex;gap:8px}
  #controls button{
    background:rgba(10,8,40,.7);border:1px solid var(--hud-line);
    color:var(--hud-dim);padding:5px 12px;border-radius:6px;
    font:inherit;font-size:11px;cursor:pointer;letter-spacing:.08em;
    transition:color .2s,border-color .2s}
  #controls button.on,#controls button:hover{color:var(--acc-dl);border-color:var(--acc-dl)}
  #feed{bottom:14px;right:14px;width:280px;padding:10px 14px;font-size:10px}
  #feed .eyebrow{margin-bottom:4px}
  #feedList{list-style:none;line-height:1.8}
  #feedList li{color:var(--hud-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #feedList b{color:var(--acc-dl)}
  #tip{position:fixed;pointer-events:none;opacity:0;transition:opacity .15s;
    background:rgba(4,2,24,.92);border:1px solid var(--hud-line);
    border-radius:8px;padding:8px 12px;font-size:11px;max-width:240px;z-index:10}
  #tip .kind{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--hud-dim);margin-bottom:3px}
  #tip .main{font-weight:600;color:var(--hud-fg);margin-bottom:2px}
  #tip .sub{color:var(--hud-dim)}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="hud" class="panel">
  <h1><span id="srcDot"></span><span id="srcLabel">SIM FEED</span></h1>
  <div class="stat"><span class="eyebrow">CPU</span><b id="cpuVal">—</b></div>
  <div class="bar" id="cpuBar"><i></i></div>
  <div class="stat"><span class="eyebrow">Memory</span><b id="memVal">—</b></div>
  <div class="bar" id="memBar"><i></i></div>
  <div class="stat"><span class="eyebrow">Disk</span><b id="dskVal">—</b></div>
  <div class="bar" id="dskBar"><i></i></div>
  <div id="netRow">
    <span class="in">▼ <b id="netIn">0</b> KB/s</span>
    <span class="out">▲ <b id="netOut">0</b> KB/s</span>
  </div>
  <div class="stat"><span class="eyebrow">GPU</span><b id="gpuVal">—</b></div>
  <div class="bar" id="gpuBar"><i style="background:linear-gradient(90deg,#44ff88,#ffcc44)"></i></div>
  <div class="stat"><span class="eyebrow">VRAM</span><b id="vramVal">—</b></div>
  <div class="bar" id="vramBar"><i style="background:linear-gradient(90deg,#00ffcc,#44ff88)"></i></div>
  <div id="netOffline">◉ NETWORK OFFLINE — comets halted</div>
</div>

<div id="legend" class="panel">
  <div class="eyebrow">Legend</div>
  <div><span class="dot" style="background:#ff8833"></span>star · CPU core</div>
  <div><span class="dot" style="background:#5577ee"></span>planet · process (size=RAM)</div>
  <div><span class="dot" style="background:#4de8ff"></span>comet ▼ · download packet</div>
  <div><span class="dot" style="background:#ff5fa8"></span>comet ▲ · upload packet</div>
  <div><span class="dot" style="background:#c0a060"></span>moon · disk storage</div>
  <div><span class="dot" style="background:#44ff88"></span>companion star · GPU</div>
  <div><span class="dot" style="background:#aaddff"></span>space station · ISS</div>
  <div><span class="dot" style="background:#55ff44"></span>alien · unknown origin</div>
</div>

<div id="controls">
  <button id="btnBloom" class="on">BLOOM</button>
  <button id="btnSrc">SIM</button>
</div>

<div id="feed" class="panel">
  <div class="eyebrow">Event Feed</div>
  <ul id="feedList"></ul>
</div>

<div id="tip"><div class="kind"></div><div class="main"></div><div class="sub"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
'use strict';
/* ================================================================
   SysCosmos v2 — Kepler orbits, satellites, space station, aliens
   Same WebSocket data contract as system-city / collector.py
   ================================================================ */

const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function rng32(seed){
  return function(){
    seed|=0;seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}

/* ---------- renderer ---------- */
const canvas=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#020008');

const camera=new THREE.PerspectiveCamera(55,1,0.5,4000);
const cam={theta:Math.PI*.55,phi:.88,r:280,tx:0,ty:0};

/* ---------- post-processing ---------- */
let composer=null,bloomPass=null,bloomEnabled=true;
try{
  composer=new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene,camera));
  bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.2,.38,.68);
  composer.addPass(bloomPass);
  const cp=new THREE.ShaderPass(THREE.CopyShader);
  cp.renderToScreen=true; composer.addPass(cp);
}catch(e){ composer=null; bloomEnabled=false; }

function onResize(){
  renderer.setSize(innerWidth,innerHeight);
  if(composer) composer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize',onResize); onResize();

/* ---------- lighting ---------- */
scene.add(new THREE.AmbientLight(0x0d0825,.5));
const sunLight=new THREE.PointLight(0xff9944,3,800);
sunLight.castShadow=true;
scene.add(sunLight);
const sunLight2=new THREE.PointLight(0xffcc88,1.2,600); // softer fill
scene.add(sunLight2);

/* ---------- central star (CPU) ---------- */
const sunMat=new THREE.MeshStandardMaterial({
  color:'#ff8833',emissive:'#ff6600',emissiveIntensity:2.5,roughness:.15,metalness:.05
});
const sun=new THREE.Mesh(new THREE.SphereGeometry(14,48,32),sunMat);
scene.add(sun);

const coronaMat=new THREE.MeshStandardMaterial({
  color:'#ff9944',emissive:'#ff7722',emissiveIntensity:1.2,
  transparent:true,opacity:.18,side:THREE.BackSide,roughness:.9
});
const corona=new THREE.Mesh(new THREE.SphereGeometry(22,24,24),coronaMat);
scene.add(corona);

// Solar flare rings
const flareRings=[];
for(let i=0;i<3;i++){
  const fr=new THREE.Mesh(
    new THREE.TorusGeometry(18+i*5,.18,6,64),
    new THREE.MeshStandardMaterial({color:'#ffaa33',emissive:'#ff8800',emissiveIntensity:.8,transparent:true,opacity:.4-.1*i})
  );
  fr.rotation.x=Math.PI/2+i*.4; fr.rotation.z=i*.7;
  scene.add(fr); flareRings.push(fr);
}

/* ---------- star field (background — slightly animated) ---------- */
const sfR=rng32(7654321);
const sfVerts=[],sfColors=[];
const SF_PALETTES=[[1,.95,.85],[.75,.85,1],[1,1,1],[1,.7,.4],[.6,.7,1]];
for(let i=0;i<5000;i++){
  const th=sfR()*Math.PI*2;
  const ph=Math.acos(2*sfR()-1);
  const r=800+sfR()*500;
  sfVerts.push(r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), r*Math.sin(ph)*Math.sin(th));
  const c=SF_PALETTES[Math.floor(sfR()*SF_PALETTES.length)];
  sfColors.push(...c);
}
const sfGeo=new THREE.BufferGeometry();
sfGeo.setAttribute('position',new THREE.Float32BufferAttribute(sfVerts,3));
sfGeo.setAttribute('color',new THREE.Float32BufferAttribute(sfColors,3));
const sfMat=new THREE.PointsMaterial({size:1.6,sizeAttenuation:true,vertexColors:true});
const starField=new THREE.Points(sfGeo,sfMat);
scene.add(starField);

/* ---------- shooting stars ---------- */
const SHOOT_POOL=8;
const shootMeshes=[], shootStates=[];
const shootRng=rng32(33221100);
for(let i=0;i<SHOOT_POOL;i++){
  const g=new THREE.Group();
  const hd=new THREE.Mesh(new THREE.SphereGeometry(.4,6,6),
    new THREE.MeshStandardMaterial({color:'#ffffff',emissive:'#ccddff',emissiveIntensity:4}));
  const tl=new THREE.Mesh(new THREE.CylinderGeometry(.06,.4,20,5),
    new THREE.MeshStandardMaterial({color:'#aabbff',emissive:'#8899ff',emissiveIntensity:2,transparent:true,opacity:.3}));
  tl.position.y=-10;
  g.add(hd,tl); g.visible=false; scene.add(g);
  shootMeshes.push(g);
  shootStates.push({active:false,vel:new THREE.Vector3(),age:0,maxAge:0});
}
let shootTimer=0;
function spawnShoot(){
  const idx=shootStates.findIndex(s=>!s.active);
  if(idx<0) return;
  const st=shootStates[idx]; const mesh=shootMeshes[idx];
  const th=shootRng()*Math.PI*2; const ph=(shootRng()-.5)*.6;
  const r=750;
  mesh.position.set(r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));
  st.vel.copy(mesh.position).negate().normalize().multiplyScalar(500+shootRng()*300);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),st.vel.clone().normalize());
  st.active=true; st.age=0; st.maxAge=1.2+shootRng()*.8;
  mesh.visible=true;
}

/* ---------- GPU companion star (binary system) ---------- */
const GPU_ORBIT_R=32;
const gpuStarMat=new THREE.MeshStandardMaterial({
  color:'#44ff88',emissive:'#22dd66',emissiveIntensity:2.2,roughness:.2,metalness:.05
});
const gpuStar=new THREE.Mesh(new THREE.SphereGeometry(7,32,24),gpuStarMat);
scene.add(gpuStar);
const gpuCoronaMat=new THREE.MeshStandardMaterial({
  color:'#44ff88',emissive:'#22dd66',emissiveIntensity:.8,
  transparent:true,opacity:.15,side:THREE.BackSide
});
const gpuCorona=new THREE.Mesh(new THREE.SphereGeometry(12,20,16),gpuCoronaMat);
scene.add(gpuCorona);
const gpuRingMat=new THREE.MeshStandardMaterial({color:'#00ffcc',emissive:'#00ffcc',emissiveIntensity:1.5,transparent:true,opacity:.8});
const gpuRing=new THREE.Mesh(new THREE.TorusGeometry(11,.35,8,64),gpuRingMat);
scene.add(gpuRing);
const gpuLight=new THREE.PointLight(0x44ff88,1.8,400);
scene.add(gpuLight);
const binRingMat=new THREE.MeshBasicMaterial({color:'#44ff88',transparent:true,opacity:.06});
const binaryGuide=new THREE.Mesh(new THREE.TorusGeometry(GPU_ORBIT_R,.05,6,80),binRingMat);
binaryGuide.rotation.x=Math.PI/2; scene.add(binaryGuide);

/* ---------- planets (processes) ---------- */
const PROC_COLORS={
  browser:'#ff7733',ai:'#cc44ff',dev:'#44ffcc',
  db:'#ffcc44',system:'#5577dd',default:'#99bbdd',
};
function procCategory(name){
  const n=name.toLowerCase();
  if(/chrome|firefox|edge|browser|opera|safari/.test(n)) return 'browser';
  if(/python|ollama|cuda|torch|ml|jupyter/.test(n)) return 'ai';
  if(/code|studio|blender|cargo|node|npm|gcc|clang|rust/.test(n)) return 'dev';
  if(/postgres|redis|mysql|mongo|sqlite|pgcat/.test(n)) return 'db';
  if(/svchost|system|lsass|winlogon|dwm|csrss|wininit|smss/.test(n)) return 'system';
  return 'default';
}

const MAX_PLANETS=20;
const planets=[];
const orbitRings=[];
const planetR=rng32(11223344);
const MIN_ORBIT=40; // innermost planet orbit radius

// Kepler's 3rd law: orbital speed ∝ 1/√r
function keplerSpeed(r){ return Math.sqrt(MIN_ORBIT/r); }

// Per-planet satellites
const allSatellites=[]; // {mesh, parentPlanetIdx, localR, localTheta, localSpeed, tilt}

function buildPlanet(proc,slotIndex){
  const cat=procCategory(proc.name);
  const col=PROC_COLORS[cat];
  const memFrac=clamp(proc.mem_mb/4096,0,1);
  const size=2.2+memFrac*5.8;
  const orbitRadius=MIN_ORBIT+slotIndex*8+(planetR()-.5)*3;
  const orbitTilt=(planetR()-.5)*0.4;
  const axialTilt=(planetR()-.5)*0.6;
  const startTheta=planetR()*Math.PI*2;
  // Base speed uses Kepler scaling so inner planets orbit much faster
  const orbitSpeed=0.38*keplerSpeed(orbitRadius)*(0.6+proc.cpu*.018)*(planetR()*.35+.83);

  const mat=new THREE.MeshStandardMaterial({
    color:col,emissive:col,emissiveIntensity:.55,roughness:.42,metalness:.22
  });
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,24,16),mat);
  mesh.rotation.z=axialTilt; // axial tilt like real planets
  mesh.userData={
    kind:'planet',proc,orbitRadius,orbitTilt,orbitSpeed,theta:startTheta,
    size,col,cat,baseEmissive:.55,axialTilt,satIds:[]
  };
  scene.add(mesh);

  const ringMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.10});
  const ring=new THREE.Mesh(new THREE.TorusGeometry(orbitRadius,.06,6,90),ringMat);
  ring.rotation.x=Math.PI/2+orbitTilt;
  scene.add(ring);

  if(size>5){
    const atmMat=new THREE.MeshStandardMaterial({
      color:col,emissive:col,emissiveIntensity:.3,
      transparent:true,opacity:.22,side:THREE.BackSide
    });
    const atm=new THREE.Mesh(new THREE.SphereGeometry(size*1.35,16,12),atmMat);
    mesh.add(atm);
  }

  // Rings for "gas giant" category processes (large memory users)
  if(memFrac>0.6 && (cat==='ai'||cat==='dev'||cat==='browser')){
    const prMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.35,side:THREE.DoubleSide});
    const prGeo=new THREE.TorusGeometry(size*1.7,size*.22,4,48);
    const planetRing=new THREE.Mesh(prGeo,prMat);
    planetRing.rotation.x=Math.PI/2+axialTilt*.5;
    mesh.add(planetRing);
  }

  planets.push(mesh);
  orbitRings.push(ring);

  // Add satellites to large planets
  const satCount=size>6 ? 3 : (size>4 ? 2 : (size>3 ? 1 : 0));
  const pidx=planets.length-1;
  for(let s=0;s<satCount;s++){
    const satR=size*2.2+s*2.5;
    const satMat=new THREE.MeshStandardMaterial({
      color:'#aaccee',emissive:'#6688aa',emissiveIntensity:.4,roughness:.8
    });
    const satMesh=new THREE.Mesh(new THREE.SphereGeometry(.55+s*.15,8,6),satMat);
    scene.add(satMesh);
    const satId=allSatellites.length;
    allSatellites.push({
      mesh:satMesh, parentPlanetIdx:pidx,
      localR:satR, localTheta:planetR()*Math.PI*2,
      localSpeed:(0.8+s*.4)*keplerSpeed(satR*.1)*2.5,
      tilt:(planetR()-.5)*.5
    });
    mesh.userData.satIds.push(satId);
  }

  return mesh;
}

/* ---------- moon (disk storage) ---------- */
const moonOrbitR=210;
const moonMat=new THREE.MeshStandardMaterial({
  color:'#c0a060',emissive:'#a07840',emissiveIntensity:.5,roughness:.88,metalness:.12
});
const moon=new THREE.Mesh(new THREE.SphereGeometry(6,24,16),moonMat);
moon.userData={kind:'disk',theta:0};
scene.add(moon);
const moonRingMat=new THREE.MeshBasicMaterial({color:'#c0a060',transparent:true,opacity:.12});
const moonOrbitRing=new THREE.Mesh(new THREE.TorusGeometry(moonOrbitR,.12,6,120),moonRingMat);
moonOrbitRing.rotation.x=Math.PI/2*.85;
scene.add(moonOrbitRing);

/* ---------- asteroid belt ---------- */
const AB_COUNT=800;
const abR=rng32(99887766);
const abVerts=[];
const AB_MIN=110, AB_MAX=145;
for(let i=0;i<AB_COUNT;i++){
  const th=abR()*Math.PI*2;
  const r=AB_MIN+(abR()*(AB_MAX-AB_MIN));
  const y=(abR()-.5)*7;
  abVerts.push(r*Math.cos(th),y,r*Math.sin(th));
}
const abGeo=new THREE.BufferGeometry();
abGeo.setAttribute('position',new THREE.Float32BufferAttribute(abVerts,3));
const abMat=new THREE.PointsMaterial({color:'#c8a870',size:.9,sizeAttenuation:true,transparent:true,opacity:.35});
const asteroids=new THREE.Points(abGeo,abMat);
scene.add(asteroids);

/* ---------- space station (ISS-style) ---------- */
const stationMat=new THREE.MeshStandardMaterial({color:'#aaddff',emissive:'#5577aa',emissiveIntensity:.4,roughness:.35,metalness:.65});
const stationGlow=new THREE.MeshStandardMaterial({color:'#ffdd88',emissive:'#ffbb44',emissiveIntensity:2.5,roughness:.3});
const panelMat=new THREE.MeshStandardMaterial({color:'#2244aa',emissive:'#1133ff',emissiveIntensity:.3,roughness:.6,metalness:.4});

const stationGroup=new THREE.Group();

// Central hub cylinder
const hub=new THREE.Mesh(new THREE.CylinderGeometry(2.5,2.5,7,16),stationMat);
stationGroup.add(hub);

// Connecting node sphere
const hubNode=new THREE.Mesh(new THREE.SphereGeometry(3.5,16,12),stationMat);
stationGroup.add(hubNode);

// Main truss arm (horizontal)
const truss=new THREE.Mesh(new THREE.BoxGeometry(72,0.8,0.8),stationMat);
stationGroup.add(truss);

// Truss detail beams
for(let i=-3;i<=3;i++){
  if(i===0) continue;
  const beam=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,3),stationMat);
  beam.position.set(i*9,0,0); stationGroup.add(beam);
}

// Solar panel arrays (4 pairs along truss)
const PANEL_POSITIONS=[-30,-16,16,30];
PANEL_POSITIONS.forEach(px=>{
  [-1,1].forEach(side=>{
    const panel=new THREE.Mesh(new THREE.BoxGeometry(12,8,.15),panelMat);
    panel.position.set(px,0,side*5.5); stationGroup.add(panel);
    // Panel frame
    const frame=new THREE.Mesh(new THREE.BoxGeometry(12.4,.3,.3),
      new THREE.MeshStandardMaterial({color:'#8899cc',emissive:'#445577',emissiveIntensity:.3,metalness:.7}));
    frame.position.set(px,4.1,side*5.5); stationGroup.add(frame);
    const frame2=frame.clone(); frame2.position.y=-4.1; stationGroup.add(frame2);
  });
});

// Module sections along the vertical axis
[-6,0,6].forEach(py=>{
  const mod=new THREE.Mesh(new THREE.CylinderGeometry(1.8,1.8,4,12),stationMat);
  mod.position.set(0,py,0); stationGroup.add(mod);
});

// Forward / aft sections
[-1,1].forEach(side=>{
  const aft=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,8,10),stationMat);
  aft.rotation.z=Math.PI/2; aft.position.set(side*12,0,0); stationGroup.add(aft);
});

// Navigation lights
['#ff4422','#44ff22','#4488ff'].forEach((col,i)=>{
  const light=new THREE.Mesh(new THREE.SphereGeometry(.4,6,4),
    new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:6}));
  light.position.set(i===0?-36:i===1?36:0, i===2?9:0, 0);
  stationGroup.add(light);
});

scene.add(stationGroup);
const STATION_ORBIT_R=165;
let stationTheta=1.2;
const STATION_ORBIT_SPEED=0.007; // slow like the real ISS (relatively)

/* ---------- alien ships (3 flying saucers) ---------- */
const ALIEN_COLORS=['#44ff33','#cc33ff','#ff3399'];
const ALIEN_SIZES=[4,3,5];
const alienGroups=[];
const alienStates=[];
const alienRng=rng32(88776655);

function buildAlienShip(col,size){
  const g=new THREE.Group();
  const discMat=new THREE.MeshStandardMaterial({
    color:col,emissive:col,emissiveIntensity:.6,roughness:.3,metalness:.8
  });

// Lissajous-like flight path generators
function alienPath(idx,t){
  const s=alienStates[idx];
  // Each alien has its own frequency ratios for complex figure-8 patterns
  const x=s.ax*Math.sin(s.fx*t+s.px);
  const y=s.ay*Math.sin(s.fy*t+s.py)*0.4; // flatter in Y
  const z=s.az*Math.cos(s.fz*t+s.pz);
  return new THREE.Vector3(x,y,z);
}

function applySnapshot(s){
  sys.cpu=s.cpu; sys.memUsed=s.mem.used; sys.memTot=s.mem.total;
  sys.dskUsed=s.disk.used; sys.dskTot=s.disk.total;
  sys.up=s.net.up_kbps; sys.down=s.net.down_kbps;
  sys.procs=s.procs||[]; sys.building=!!s.building;
  if(s.gpu&&s.gpu[0]){
    sys.gpuUtil=s.gpu[0].util_pct||0; sys.gpuMem=s.gpu[0].mem_used_mb||0;
    sys.gpuMemTotal=s.gpu[0].mem_total_mb||32768; sys.gpuTemp=s.gpu[0].temp_c||45;
  }
  const sorted=[...sys.procs].sort((a,b)=>b.mem_mb-a.mem_mb).slice(0,MAX_PLANETS);
  if(sorted.length!==planets.length||sorted.some((p,i)=>p.pid!==planets[i]?.userData?.proc?.pid)){
    // Remove old satellites
    allSatellites.forEach(sat=>scene.remove(sat.mesh));
    allSatellites.length=0;
    planets.forEach(m=>{scene.remove(m); pick.splice(pick.indexOf(m),1);});
    orbitRings.forEach(r=>scene.remove(r));
    planets.length=0; orbitRings.length=0;
    sorted.forEach((p,i)=>{ const m=buildPlanet(p,i); pick.push(m); });
  } else {
    planets.forEach((m,i)=>{
      if(sorted[i]){
        m.userData.proc=sorted[i];
        const cpuFrac=clamp(sorted[i].cpu/40,0,1);
        m.material.emissiveIntensity=lerp(.35,1.4,cpuFrac);
      }
    });
  }
  hud();
}
function applyEvent(ev){

  else if(ev.kind==='build_start'){ sys.building=true; feedLine(`<b>BUILD</b> ${ev.name||'started'}`); }
  else if(ev.kind==='build_end'){ sys.building=false; feedLine(`<b>BUILD</b> done`); }
}
function onFeed(msg){

}

/* ---------- main loop ---------- */
const clock=new THREE.Clock();
const _alienPrev=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05), t=clock.elapsedTime;

  /* === CPU STAR === */
  const cpuFrac=clamp(sys.cpu/100,0,1);
  const pulse=1+Math.sin(t*(2.5+cpuFrac*5))*.07*(0.4+cpuFrac*.8);
  sun.scale.setScalar(pulse);
  corona.scale.setScalar(.9+cpuFrac*.25+Math.sin(t*1.8)*.04);
  sunMat.emissiveIntensity=lerp(1.5,4.5,cpuFrac)+Math.sin(t*3.2)*.35;
  sunLight.intensity=lerp(2,6,cpuFrac);
  sunLight2.position.set(Math.cos(t*.08)*200,60,Math.sin(t*.08)*200);
  if(bloomPass) bloomPass.strength=lerp(.7,1.6,cpuFrac);

  // Flare rings
  flareRings.forEach((fr,i)=>{
    fr.rotation.z+=dt*(0.2+i*.15)*(1+cpuFrac);
    fr.rotation.x+=dt*(0.1+i*.08);
    const fi=fr.material;
    fi.opacity=lerp(.1,.55,cpuFrac)+Math.sin(t*2+i*2.1)*.08;
  });

  /* === GPU COMPANION STAR === */
  const gpuFrac=clamp(sys.gpuUtil/100,0,1);
  const gpuTheta=t*.18;
  const gpuX=Math.cos(gpuTheta)*GPU_ORBIT_R;
  const gpuZ=Math.sin(gpuTheta)*GPU_ORBIT_R;
  gpuStar.position.set(gpuX,Math.sin(gpuTheta*.4)*4,gpuZ);
  gpuCorona.position.copy(gpuStar.position);
  gpuRing.position.copy(gpuStar.position);
  gpuLight.position.copy(gpuStar.position);
  sun.position.set(-gpuX*.22,0,-gpuZ*.22);
  sunLight.position.copy(sun.position);
  corona.position.copy(sun.position);
  const gpuPulse=1+Math.sin(t*(3+gpuFrac*6))*.09*(0.5+gpuFrac);
  gpuStar.scale.setScalar(gpuPulse); gpuCorona.scale.setScalar(gpuPulse*1.1);
  const tempFrac=clamp((sys.gpuTemp-40)/60,0,1);
  const gpuHeat=new THREE.Color().setHSL(lerp(.33,.0,tempFrac),.9,.55);
  gpuStarMat.color.copy(gpuHeat); gpuStarMat.emissive.copy(gpuHeat);
  gpuStarMat.emissiveIntensity=lerp(1.5,4,gpuFrac)+Math.sin(t*2.8)*.3;
  gpuLight.color.copy(gpuHeat); gpuLight.intensity=lerp(1,3.5,gpuFrac);
  const vramFrac=clamp(sys.gpuMem/sys.gpuMemTotal,0,1);
  gpuRingMat.opacity=lerp(.2,1.0,vramFrac);
  gpuRing.rotation.x=Math.PI/2; gpuRing.rotation.z=t*.5;

  /* === PLANETS (Kepler orbits) === */
  planets.forEach((m,pi)=>{
    const d=m.userData;
    d.theta+=d.orbitSpeed*dt; // speed already accounts for Kepler
    const cx=sun.position.x, cz=sun.position.z; // barycenter follows binary
    m.position.set(
      cx+Math.cos(d.theta)*d.orbitRadius,
      Math.sin(d.theta+d.orbitTilt*3)*d.orbitRadius*Math.sin(d.orbitTilt),
      cz+Math.sin(d.theta)*d.orbitRadius
    );
    m.rotation.y+=dt*.5;
  });

  /* === SATELLITES === */
  allSatellites.forEach(sat=>{
    const parent=planets[sat.parentPlanetIdx];
    if(!parent) return;
    sat.localTheta+=sat.localSpeed*dt;
    sat.mesh.position.set(
      parent.position.x+Math.cos(sat.localTheta)*sat.localR,
      parent.position.y+Math.sin(sat.localTheta+sat.tilt)*sat.localR*Math.sin(sat.tilt+.3),
      parent.position.z+Math.sin(sat.localTheta)*sat.localR
    );
    sat.mesh.rotation.y+=dt*1.5;
  });

  /* === MOON === */
  moon.userData.theta+=.065*dt;
  const mTheta=moon.userData.theta;
  moon.position.set(Math.cos(mTheta)*moonOrbitR,Math.sin(mTheta*.3)*20,Math.sin(mTheta)*moonOrbitR);
  const dskFrac=clamp(sys.dskUsed/sys.dskTot,0,1);
  moonMat.emissiveIntensity=lerp(.7,.1,dskFrac);
  moon.rotation.y+=dt*.25;

  /* === ASTEROID BELT === */
  asteroids.rotation.y+=dt*.01;
  abMat.opacity=lerp(.15,.5,clamp(sys.dskUsed/sys.dskTot+Math.sin(t*.9)*.08,0,1));

  /* === SPACE STATION === */
  stationTheta+=STATION_ORBIT_SPEED*dt;
  const sx=Math.cos(stationTheta)*STATION_ORBIT_R;
  const sz=Math.sin(stationTheta)*STATION_ORBIT_R;
  const sy=Math.sin(stationTheta*.12)*12; // slight inclination
  stationGroup.position.set(sx,sy,sz);
  stationGroup.rotation.y=stationTheta+Math.PI/2; // always face forward
  stationGroup.rotation.z=Math.sin(t*.03)*.02; // gentle wobble
  stationGroup.rotation.x=Math.sin(t*.04)*.015;
  // Blink nav lights
  stationGroup.children.forEach(c=>{
    if(c.isMesh&&c.material&&c.material.emissiveIntensity>4){
      const phase=t*3+(c.position.x*.2);
      c.material.emissiveIntensity=Math.max(0,4+Math.sin(phase)*3.5);
    }
  });

  /* === ALIEN SHIPS === */
  alienGroups.forEach((g,i)=>{
    const st=alienStates[i];
    const newPos=alienPath(i,t);
    // Calculate velocity direction for orientation
    _alienPrev.copy(st.prevPos);
    if(_alienPrev.length()<1) _alienPrev.copy(newPos);
    g.position.copy(newPos);
    st.prevPos.copy(newPos);
    // Roll in direction of travel
    g.rotation.y+=dt*st.rollSpeed*.3;
    g.rotation.z=Math.sin(t*st.fy+st.py)*.2;
    // Glow pulse
    g.traverse(c=>{
      if(c.isMesh&&c.material&&c.material.emissiveIntensity>3){
        c.material.emissiveIntensity=3.5+Math.sin(t*4+st.glowPhase)*1.5;
      }
    });
    // Random hyper-jump every ~30s
    if(Math.floor(t/30+i*.33)!==Math.floor((t-dt)/30+i*.33)){
      st.px+=Math.PI*(alienRng()-.5)*4;
      st.pz+=Math.PI*(alienRng()-.5)*4;
      feedLine(`<b>ALIEN ${i+1}</b> hyperjump detected`);
    }
  });

  /* === SHOOTING STARS === */
  shootTimer+=dt;
  if(shootTimer>15+shootRng()*30){ // every 15-45s
    shootTimer=0; spawnShoot();
  }
  shootStates.forEach((st,i)=>{
    if(!st.active) return;
    st.age+=dt;
    if(st.age>st.maxAge){ st.active=false; shootMeshes[i].visible=false; return; }
    shootMeshes[i].position.addScaledVector(st.vel,dt);
    const fade=clamp(1-st.age/st.maxAge,0,1);
    shootMeshes[i].children[0].material.opacity=fade;
    shootMeshes[i].children[1].material.opacity=fade*.35;
  });

  /* === COMETS (network) === */
  const netTotal=sys.down+sys.up;
  const netFrac=clamp(netTotal/2000,0,1);
  const online=netTotal>8;
  if(online){
    cometTimer+=dt;
    const spawnInterval=lerp(.7,.08,netFrac);
    if(cometTimer>spawnInterval){
      cometTimer=0;
      const dlFrac=sys.down/(sys.down+sys.up+.01);
      spawnComet(Math.random()<dlFrac?'dl':'ul');
    }
  }
  cometState.forEach((st,i)=>{
    if(!st.active) return;
    const mesh=cometMeshes[i];
    st.age+=dt;
    if(st.age>st.maxAge||mesh.position.length()>260){
      st.active=false; mesh.visible=false; return;
    }
    mesh.position.addScaledVector(st.vel,dt);
    const fade=clamp(1-st.age/st.maxAge,0,1);
    mesh.children[0].material.opacity=fade;
    mesh.children[1].material.opacity=fade*.55;
  });

  /* === STARFIELD slow drift === */
  starField.rotation.y+=dt*.00015;

  /* === CAMERA + HOVER === */
  if(!drag) cam.theta+=dt*.006;
  applyCam(); hover();

  if(bloomEnabled&&composer) composer.render();
  else renderer.render(scene,camera);
}

/* ---------- initial pump ---------- */
applySnapshot({type:'snapshot',cpu:22,mem:{used:41,total:128},
  disk:{used:1430,total:2000},net:{up_kbps:35,down_kbps:140},
  procs:new SimAdapter(()=>{}).procs,building:false,
  gpu:[{util_pct:12,mem_used_mb:4200,mem_total_mb:32768,temp_c:48,name:'RTX 5090'}]});
srcUI();
animate();
</script>
